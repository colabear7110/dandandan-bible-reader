<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>단.단.단 성경통독</title>
    <meta name="theme-color" content="#1f6f5b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="단.단.단" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <link rel="stylesheet" href="./styles.css?v=5" />
  </head>
  <body>
    <main class="app-shell">
      <section class="player-panel" aria-labelledby="app-title">
        <div class="topbar">
          <div>
            <p class="kicker">매일 말씀과 함께</p>
            <h1 id="app-title">단.단.단 성경통독</h1>
          </div>
          <button class="icon-button" id="settingsToggle" type="button" aria-label="설정 열기" title="설정">
            ⚙
          </button>
        </div>

        <div class="today-strip">
          <div>
            <span class="label">오늘의 통독</span>
            <strong id="todayTitle">1일차 성경통독</strong>
          </div>
          <button id="completeToday" class="primary-action" type="button">봤어요</button>
        </div>

        <div class="video-frame">
          <iframe
            id="youtubePlayer"
            title="단.단.단 성경통독 영상"
            src=""
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            allowfullscreen
          ></iframe>
          <div class="empty-player" id="emptyPlayer">
            <strong>교회 유튜브 재생목록을 연결해 주세요</strong>
            <button id="connectPlaylist" class="primary-action" type="button">재생목록 연결</button>
          </div>
        </div>
        <a class="youtube-link" id="openYoutube" href="#" target="_blank" rel="noreferrer">유튜브에서 열기</a>

        <nav class="day-controls" aria-label="영상 이동">
          <button id="prevDay" type="button">이전</button>
          <span id="dayPosition">1 / 1</span>
          <button id="nextDay" type="button">다음</button>
        </nav>
      </section>

      <aside class="list-panel" aria-label="통독 목록">
        <div class="progress-card">
          <span class="label">나의 진행률</span>
          <div class="progress-row">
            <strong id="progressText">0%</strong>
            <span id="progressCount">0개 완료</span>
          </div>
          <div class="progress-track" aria-hidden="true">
            <div id="progressFill"></div>
          </div>
          <button id="completeBeforeToday" class="secondary-action" type="button">오늘 이전 통독 완료</button>
        </div>

        <div class="search-row">
          <input id="searchInput" type="search" placeholder="날짜, 성경 범위 검색" aria-label="통독 영상 검색" />
        </div>

        <div class="playlist-list" id="playlistList"></div>
      </aside>
    </main>

    <dialog id="settingsDialog">
      <form method="dialog" class="settings-form">
        <div class="dialog-header">
          <h2>유튜브 연결</h2>
          <button class="icon-button" value="close" aria-label="닫기" title="닫기">×</button>
        </div>
        <label>
          재생목록 ID 또는 URL
          <input id="playlistInput" type="text" placeholder="https://www.youtube.com/playlist?list=..." />
        </label>
        <p>
          교회 유튜브 재생목록 주소를 붙여 넣으면 앱 전체가 그 목록으로 연결됩니다.
        </p>
        <menu>
          <button value="cancel" type="reset">취소</button>
          <button id="saveSettings" class="primary-action" value="default" type="button">저장</button>
        </menu>
      </form>
    </dialog>

    <script src="./videos.js?v=5"></script>
    <script src="./app.js?v=5"></script>
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.getRegistrations().then((registrations) => {
          registrations.forEach((registration) => registration.unregister());
        });
      }
    </script>
  </body>
</html>
