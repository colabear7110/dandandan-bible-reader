name: Update YouTube Videos

on:
  schedule:
    # 07:01, 07:16, 07:31 KST every day.
    - cron: "1,16,31 22 * * *"
    # 08:01 KST fallback in case YouTube updates the playlist late.
    - cron: "1 23 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
permissions:
  contents: write

jobs:
  update-videos:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Update videos.js from YouTube RSS
        run: node scripts/update-videos.mjs

      - name: Commit updated video map
        run: |
          if git diff --quiet -- videos.js; then
            echo "No video changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add videos.js
          git commit -m "Update YouTube video map"
          git push
