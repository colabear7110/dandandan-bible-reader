name: Update YouTube Videos

on:
  schedule:
    # 07:05-07:55 KST every day. GitHub scheduled runs can be delayed, so retry often.
    - cron: "5,15,25,35,45,55 22 * * *"
    # 08:05-08:50 KST every day.
    - cron: "5,20,35,50 23 * * *"
    # 09:20 KST final fallback.
    - cron: "20 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-videos:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Update videos.js from YouTube RSS
        run: node scripts/update-videos.mjs

      - name: Commit updated video map
        run: |
          if git diff --quiet -- videos.js; then
            echo "No video changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add videos.js
          git commit -m "Update YouTube video map"
          git push
