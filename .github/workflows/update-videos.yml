name: Update YouTube Videos

on:
  schedule:
    # 07:01 KST every day.
    - cron: "1 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-videos:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Update videos.js from YouTube RSS
        run: node scripts/update-videos.mjs

      - name: Commit updated video map
        run: |
          if git diff --quiet -- videos.js; then
            echo "No video changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add videos.js
          git commit -m "Update YouTube video map"
          git push
